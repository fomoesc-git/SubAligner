name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            bundle_args: --bundles dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            bundle_args: --bundles msi,nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Python Sidecar
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt
          pip install pyinstaller

      - name: Build Python Sidecar (macOS)
        if: runner.os == 'macOS'
        working-directory: engine
        run: python build.py

      - name: Build Python Sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: engine
        run: python build.py

      # Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      # Tauri
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SubAligner ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true

      # Windows: upload standalone exe from NSIS installer
      - name: Upload Windows portable info
        if: runner.os == 'Windows'
        run: |
          echo "Windows builds include:"
          echo "1. SubAligner_x64_en-US.msi - MSI installer"
          echo "2. SubAligner_x64-setup.exe - NSIS installer (single-file installer)"
          echo ""
          echo "Note: Tauri apps require WebView2 runtime and resources, so a true single-file portable exe is not supported."
          echo "The NSIS setup.exe is the closest to a single-file distribution."
